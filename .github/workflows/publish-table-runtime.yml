name: Publish Table Runtime

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish, e.g. 0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Mochi local backend
        run: pnpm -F @teable/backend mochi:build

      - name: Build Mochi local frontend
        env:
          NEXT_BUILD_ENV_OUTPUT: standalone
          NEXT_BUILD_ENV_CSP: 'false'
          NEXT_BUILD_ENV_SENTRY_ENABLED: 'false'
          NEXT_BUILD_ENV_SENTRY_UPLOAD_DRY_RUN: 'true'
          NEXT_BUILD_ENV_TYPECHECK: 'false'
          MOCHI_LOCAL_RUNTIME: 'true'
          MOCHI_BACKEND_API_URL: http://127.0.0.1:3911
          SOCKET_PORT: '3911'
        run: pnpm -C apps/nextjs-app build

      - name: Prepare runtime package
        run: pnpm -F @mochi-cli/table-runtime pack:runtime

      - name: Set package version
        run: pnpm -F @mochi-cli/table-runtime version "${{ inputs.version }}" --no-git-tag-version

      - name: Pack runtime tarball
        run: pnpm -C packages/mochi-table-runtime pack --pack-destination "$GITHUB_WORKSPACE"

      - name: Publish GitHub release tarball
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          tag="table-runtime-v${VERSION}"
          asset="mochi-cli-table-runtime-${VERSION}.tgz"

          if [ ! -f "${asset}" ]; then
            echo "Missing packed runtime asset: ${asset}" >&2
            ls -la *.tgz >&2 || true
            exit 1
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber
          else
            gh release create "${tag}" "${asset}" \
              --title "Mochi Table Runtime ${VERSION}" \
              --notes "Mochi Table Runtime ${VERSION} packaged as an npm-installable tarball."
          fi
